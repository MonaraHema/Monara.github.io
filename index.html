<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monara PC Builds | Custom Rigs</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff; /* Cyan */
            --accent: #ff00ff;  /* Neon Pink */
            --bg: #050505;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* The "All Bells" Animated Background */
        .neon-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #0a0a0a 25%, #111 25%, #111 50%, #0a0a0a 50%, #0a0a0a 75%, #111 75%, #111 100%);
            background-size: 50px 50px;
            opacity: 0.2;
            z-index: -1;
        }

        /* Glowing Header */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, rgba(0, 242, 255, 0.1) 0%, transparent 70%);
        }

        .glitch-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 10vw, 6rem);
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 20px var(--primary);
            margin: 0;
        }

        /* Glassmorphism Cards */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 50px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .pc-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .pc-card:hover {
            transform: scale(1.05);
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
        }

        .pc-card h2 {
            font-family: 'Orbitron';
            color: var(--primary);
        }

        .button-pulse {
            margin-top: 30px;
            padding: 15px 40px;
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0, 242, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); }
        }
    </style>
</head>
<body>

    <div class="neon-mesh"></div>

    <header>
        <h1 class="glitch-title" data-aos="zoom-in">Monara Tech</h1>
        <p data-aos="fade-up" data-aos-delay="300">Custom Built. Performance Driven.</p>
        <button class="button-pulse">Configure Your Rig</button>
    </header>

    <div class="container">
        <div class="pc-card" data-aos="fade-right">
            <h2>The Titan</h2>
            <p>RTX 5090 | 128GB DDR5</p>
            <p>Built for the creators of tomorrow.</p>
        </div>
        <div class="pc-card" data-aos="fade-up" data-aos-delay="200">
            <h2>The Ghost</h2>
            <p>Whiteout Aesthetic | Liquid Cooled</p>
            <p>Silence meets absolute power.</p>
        </div>
        <div class="pc-card" data-aos="fade-left" data-aos-delay="400">
            <h2>The Edge</h2>
            <p>Small Form Factor | Mini-ITX</p>
            <p>Maximum power in a minimal footprint.</p>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000 });
    </script>
</body>
</html>
